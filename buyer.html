<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohrab Industries | Buyer Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(145deg, #0a1a15 0%, #0d281f 100%); min-height: 100vh; }
        
        .buyer-header {
            background: linear-gradient(135deg, #0a2f24, #1a4a3a);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid rgba(232,177,60,0.5);
        }
        .logo h1 { font-size: 1.6rem; font-family: 'Playfair Display', serif; color: #E8B13C; cursor: pointer; }
        .search-bar { display: flex; gap: 10px; background: rgba(255,255,255,0.15); padding: 5px 20px; border-radius: 50px; }
        .search-bar input { background: transparent; border: none; padding: 10px; width: 250px; color: white; }
        .search-bar button { background: none; border: none; color: #E8B13C; cursor: pointer; }
        .header-icons { display: flex; gap: 20px; align-items: center; }
        .cart-count { position: absolute; top: -8px; right: -12px; background: #E8B13C; color: #0a1f1a; border-radius: 50%; padding: 2px 6px; font-size: 10px; }
        .logout-btn { background: #dc3545; color: white; padding: 8px 20px; border: none; border-radius: 40px; cursor: pointer; }
        
        .buyer-container { max-width: 1400px; margin: 2rem auto; padding: 0 5%; }
        .hero-banner { background: rgba(232,177,60,0.1); border-radius: 28px; padding: 3rem; text-align: center; margin-bottom: 2rem; }
        .hero-banner h2 { color: #E8B13C; font-family: 'Playfair Display', serif; }
        
        .tabs { display: flex; gap: 12px; margin-bottom: 1.8rem; background: rgba(0,0,0,0.3); padding: 8px 20px; border-radius: 80px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 28px; background: transparent; border: none; border-radius: 50px; color: rgba(255,255,255,0.8); cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .tab-btn.active { background: linear-gradient(135deg, #E8B13C, #c99b2e); color: #0a1f1a; }
        .tab-content { display: none; background: rgba(20,45,38,0.92); border-radius: 28px; padding: 1.8rem; border: 1px solid rgba(232,177,60,0.2); }
        .tab-content.active { display: block; }
        .section-title { color: #E8B13C; font-size: 1.5rem; margin-bottom: 20px; border-left: 5px solid #E8B13C; padding-left: 18px; }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .product-card { background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; border: 1px solid rgba(232,177,60,0.2); transition: all 0.3s; }
        .product-card:hover { transform: translateY(-5px); border-color: #E8B13C; }
        .product-image { background: rgba(232,177,60,0.1); height: 180px; display: flex; align-items: center; justify-content: center; font-size: 4rem; color: #E8B13C; }
        .product-info { padding: 20px; }
        .product-name { font-size: 1.2rem; font-weight: 700; color: #E8B13C; }
        .product-price { font-size: 1.3rem; font-weight: 800; color: #E8B13C; margin: 10px 0; }
        .add-to-cart { width: 100%; padding: 12px; background: linear-gradient(135deg, #E8B13C, #c99b2e); border: none; border-radius: 40px; cursor: pointer; font-weight: 700; }
        
        .cart-sidebar { position: fixed; right: -450px; top: 0; width: 420px; height: 100%; background: #1a3d33; z-index: 1000; transition: right 0.3s; display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        .cart-header { padding: 20px; background: #0a2f24; display: flex; justify-content: space-between; }
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-footer { padding: 20px; border-top: 1px solid rgba(232,177,60,0.3); }
        .checkout-btn { width: 100%; padding: 12px; background: #28a745; border: none; border-radius: 40px; color: white; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 999; }
        .overlay.active { display: block; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1003; align-items: center; justify-content: center; }
        .modal-content { background: #1a3d33; padding: 35px; border-radius: 40px; max-width: 500px; width: 90%; }
        .modal-content h2 { color: #E8B13C; }
        .modal-content textarea, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.08); border: 1px solid rgba(232,177,60,0.3); border-radius: 16px; color: white; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(232,177,60,0.15); color: white; }
        th { color: #E8B13C; }
        
        .form-card { background: rgba(0,0,0,0.3); border-radius: 24px; padding: 25px; }
        .edit-icon { cursor: pointer; color: #E8B13C; padding: 10px; border-radius: 50%; background: rgba(0,0,0,0.3); }
        .contact-message-card { background: rgba(0,0,0,0.2); border-radius: 20px; padding: 15px; margin-bottom: 12px; border-left: 4px solid #E8B13C; }
        .admin-reply { background: rgba(232,177,60,0.15); border-left: 3px solid #E8B13C; margin-top: 8px; padding: 10px; border-radius: 12px; }
        .status-badge { padding: 5px 15px; border-radius: 30px; font-size: 12px; display: inline-block; }
        .toast-notification { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 28px; border-radius: 60px; color: white; z-index: 10000; }
        .toast-success { background: #1e7e5e; }
        .toast-error { background: #dc3545; }
        .empty-state { text-align: center; padding: 50px; color: rgba(255,255,255,0.5); }
        
        @media (max-width: 768px) { .cart-sidebar { width: 100%; right: -100%; } .products-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="buyer-header">
        <div class="logo"><h1 onclick="location.reload()"><i class="fas fa-lightbulb"></i> Sohrab Industries</h1></div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search products..." onkeypress="if(event.key==='Enter') searchProducts()">
            <button onclick="searchProducts()"><i class="fas fa-search"></i></button>
        </div>
        <div class="header-icons">
            <button onclick="toggleCart()" style="background:none; border:none; color:white; position:relative;"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></button>
            <span id="userName"></span>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
    </div>

    <div class="buyer-container">
        <div class="hero-banner">
            <h2>Premium Quality LED Solutions</h2>
            <p>Energy Efficient • Best Prices • Free Delivery on orders over Rs. 2,000</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="shop">Shop</button>
            <button class="tab-btn" data-tab="orders">My Orders</button>
            <button class="tab-btn" data-tab="profile">My Profile</button>
            <button class="tab-btn" data-tab="contact">Support</button>
        </div>

        <div id="shopTab" class="tab-content active">
            <div class="categories" id="categoriesList"></div>
            <div class="products-grid" id="productsGrid"></div>
        </div>

        <div id="ordersTab" class="tab-content">
            <h2 class="section-title">My Orders</h2>
            <div class="table-container"><tbody id="ordersList"></tbody></div>
        </div>

        <div id="profileTab" class="tab-content">
            <h2 class="section-title">My Profile</h2>
            <div class="form-card">
                <div><label>Full Name</label><input type="text" id="profileName" readonly></div>
                <div><label>Email</label><input type="email" id="profileEmail" readonly></div>
                <div><label>Phone</label><input type="tel" id="profilePhone" readonly></div>
                <div><label>Address</label><textarea id="profileAddress" readonly rows="2"></textarea></div>
            </div>
        </div>

        <div id="contactTab" class="tab-content">
            <h2 class="section-title">Contact Support</h2>
            <div style="display: grid; grid-template-columns: 1fr 1.2fr; gap: 25px;">
                <div class="form-card">
                    <h3 style="color:#E8B13C;">Send Message</h3>
                    <input type="text" id="contactSubject" placeholder="Subject">
                    <textarea id="contactMessage" rows="5" placeholder="Your message..."></textarea>
                    <button id="sendContactBtn" class="checkout-btn" style="background:#E8B13C; color:#0a1f1a;">Send to Support</button>
                </div>
                <div class="form-card">
                    <h3 style="color:#E8B13C;">Conversations</h3>
                    <div id="contactMessagesList"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header"><h3>Your Cart</h3><button onclick="toggleCart()">&times;</button></div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer"><div class="cart-total">Total: Rs. <span id="cartTotal">0</span></div><button class="checkout-btn" onclick="showCheckout()">Checkout</button></div>
    </div>

    <div id="checkoutModal" class="modal">
        <div class="modal-content">
            <h2>Checkout</h2>
            <textarea id="checkoutAddress" rows="3" placeholder="Delivery Address"></textarea>
            <select id="paymentMethod"><option>Cash on Delivery</option><option>EasyPaisa</option><option>JazzCash</option></select>
            <div>Total: Rs. <span id="checkoutTotal">0</span></div>
            <button id="placeOrderBtn" class="checkout-btn">Place Order</button>
            <button onclick="closeCheckout()">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://czvxrjtdintvfjcgblxm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6dnhyanRkaW50dmZqY2dibHhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTY4NTcsImV4cCI6MjA5MTQ3Mjg1N30.jc8n6tinfkM7LuEMza1N2yX2u-IeVgOfFcaAtwBjX0g';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentBuyerId = null;
        let cart = [];
        let allProducts = [];
        
        function showNotification(msg, isError = false) {
            const t = document.createElement('div');
            t.className = `toast-notification ${isError ? 'toast-error' : 'toast-success'}`;
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`${tabName}Tab`).classList.add('active');
            document.querySelector(`.tab-btn[data-tab="${tabName}"]`).classList.add('active');
            if(tabName === 'contact') loadMessages();
        }
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.getAttribute('data-tab')));
        });
        
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser();
            if(!user) { window.location.href = 'buyer-auth.html'; return; }
            currentBuyerId = user.id;
            document.getElementById('userName').innerHTML = `<i class="fas fa-user-circle"></i> ${user.email.split('@')[0]}`;
            await ensureBuyerExists(user);
            await loadProducts();
            await loadOrders();
            await loadProfile();
            loadCart();
            await loadMessages();
            setupRealtime();
        }
        
        async function ensureBuyerExists(user) {
            const { data: existing } = await supabase.from('buyers').select('*').eq('id', user.id);
            if(existing?.length) return;
            await supabase.from('buyers').insert([{
                id: user.id, email: user.email, full_name: user.email.split('@')[0],
                phone: '', address: '', total_orders: 0, total_spent: 0, created_at: new Date().toISOString()
            }]);
        }
        
        async function loadProducts() {
            const { data } = await supabase.from('products').select('*').eq('is_active', true);
            if(data) { allProducts = data; displayProducts(); }
        }
        
        function displayProducts(searchTerm = '') {
            let filtered = allProducts;
            if(searchTerm) filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm));
            const container = document.getElementById('productsGrid');
            if(!filtered.length) { container.innerHTML = '<div class="empty-state">No products</div>'; return; }
            container.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="product-image"><i class="fas fa-lightbulb"></i></div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">Rs. ${p.price}</div>
                        <button class="add-to-cart" onclick="addToCart('${p.id}', '${p.name.replace(/'/g, "\\'")}', ${p.price})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }
        
        window.searchProducts = function() { displayProducts(document.getElementById('searchInput').value.toLowerCase()); };
        
        function loadCart() { const saved = localStorage.getItem(`cart_${currentBuyerId}`); if(saved) { cart = JSON.parse(saved); updateCartUI(); } }
        function saveCart() { localStorage.setItem(`cart_${currentBuyerId}`, JSON.stringify(cart)); updateCartUI(); }
        
        window.addToCart = function(id, name, price) {
            const existing = cart.find(item => item.id === id);
            if(existing) existing.quantity++;
            else cart.push({ id, name, price, quantity: 1 });
            saveCart();
            showNotification(`${name} added to cart!`);
        };
        
        function updateCartUI() {
            const container = document.getElementById('cartItems');
            const count = cart.reduce((s,i) => s + i.quantity, 0);
            document.getElementById('cartCount').innerHTML = count;
            if(!cart.length) { container.innerHTML = '<p style="text-align:center;padding:20px;">Cart empty</p>'; return; }
            container.innerHTML = cart.map(item => `
                <div><strong>${item.name}</strong> x${item.quantity} = Rs.${item.price * item.quantity}</div>
            `).join('');
            const total = cart.reduce((s,i) => s + (i.price * i.quantity), 0);
            document.getElementById('cartTotal').innerHTML = total;
        }
        
        window.toggleCart = function() {
            document.getElementById('cartSidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        };
        
        window.showCheckout = function() {
            if(!cart.length) { showNotification('Cart empty', true); return; }
            const total = cart.reduce((s,i) => s + (i.price * i.quantity), 0);
            document.getElementById('checkoutTotal').innerHTML = total;
            document.getElementById('checkoutModal').style.display = 'flex';
        };
        window.closeCheckout = function() { document.getElementById('checkoutModal').style.display = 'none'; };
        
        async function loadOrders() {
            const { data } = await supabase.from('orders').select('*').eq('user_id', currentBuyerId).order('order_date', { ascending: false });
            const tbody = document.getElementById('ordersList');
            if(!data?.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty-state">No orders</td></tr>'; return; }
            tbody.innerHTML = data.map(o => `<tr><td>${o.id.slice(0,8)}</td><td>-</td><td>Rs.${o.total_amount}</td><td>${new Date(o.order_date).toLocaleDateString()}</td><td>${o.status}</td><td>${o.payment_status}</td><td>${o.delivery_address}</td></tr>`).join('');
        }
        
        async function loadProfile() {
            const { data } = await supabase.from('buyers').select('*').eq('id', currentBuyerId);
            if(data?.[0]) {
                document.getElementById('profileName').value = data[0].full_name || '';
                document.getElementById('profileEmail').value = data[0].email || '';
                document.getElementById('profilePhone').value = data[0].phone || '';
                document.getElementById('profileAddress').value = data[0].address || '';
            }
        }
        
        // ========== CHAT SYSTEM ==========
        async function loadMessages() {
            const { data } = await supabase.from('contact_messages').select('*').eq('buyer_id', currentBuyerId).order('created_at', { ascending: false });
            const container = document.getElementById('contactMessagesList');
            if(!data?.length) { container.innerHTML = '<div class="empty-state">No messages yet</div>'; return; }
            container.innerHTML = data.map(msg => `
                <div class="contact-message-card">
                    <div><strong style="color:#E8B13C;">${msg.subject || 'Inquiry'}</strong> <small>${new Date(msg.created_at).toLocaleString()}</small></div>
                    <p><strong>You:</strong> ${msg.message}</p>
                    ${msg.reply ? `<div class="admin-reply"><strong>Sohrab Industries Support:</strong><p>${msg.reply}</p></div>` : '<div><span class="status-badge" style="background:#b8860b;">Awaiting Reply</span></div>'}
                </div>
            `).join('');
        }
        
        document.getElementById('sendContactBtn')?.addEventListener('click', async () => {
            const subject = document.getElementById('contactSubject').value.trim();
            const message = document.getElementById('contactMessage').value.trim();
            if(!message) { showNotification('Please write a message', true); return; }
            
            const { error } = await supabase.from('contact_messages').insert([{
                id: crypto.randomUUID(),
                buyer_id: currentBuyerId,
                subject: subject || 'Support Inquiry',
                message: message,
                sender_type: 'buyer',
                receiver_type: 'admin',
                created_at: new Date().toISOString(),
                status: 'pending'
            }]);
            
            if(error) { showNotification('Error: ' + error.message, true); return; }
            showNotification('Message sent to support!');
            document.getElementById('contactSubject').value = '';
            document.getElementById('contactMessage').value = '';
            await loadMessages();
        });
        
        function setupRealtime() {
            supabase.channel('public:contact_messages')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'contact_messages', filter: `buyer_id=eq.${currentBuyerId}` }, () => {
                    if(document.getElementById('contactTab')?.classList.contains('active')) loadMessages();
                }).subscribe();
        }
        
        document.getElementById('placeOrderBtn').onclick = async function() {
            const address = document.getElementById('checkoutAddress').value;
            if(!address) { showNotification('Enter address', true); return; }
            const total = cart.reduce((s,i) => s + (i.price * i.quantity), 0);
            const { error } = await supabase.from('orders').insert([{
                user_id: currentBuyerId, user_type: 'buyer', order_date: new Date().toISOString().split('T')[0],
                total_amount: total, status: 'pending', payment_method: 'Cash on Delivery',
                payment_status: 'pending', delivery_address: address, notes: JSON.stringify(cart)
            }]);
            if(error) { showNotification(error.message, true); return; }
            showNotification('Order placed!');
            cart = []; saveCart(); closeCheckout(); toggleCart();
            await loadOrders();
        };
        
        document.getElementById('logoutBtn').onclick = async () => { await supabase.auth.signOut(); window.location.href = 'buyer-auth.html'; };
        checkAuth();
    </script>
</body>
</html>
