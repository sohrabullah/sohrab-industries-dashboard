<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sohrab Industries | Premium Storefront</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Swiper for product slider -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f5f7fb; color: #1e2a32; overflow-x: hidden; }
        /* Amazon-style utility */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        /* header */
        .top-bar { background: #131921; color: white; padding: 10px 0; font-size: 14px; }
        .top-bar .container { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #ffb347, #ff8c00); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .search-bar { display: flex; flex: 1; max-width: 500px; margin: 0 20px; }
        .search-bar input { flex: 1; padding: 12px 16px; border: none; border-radius: 24px 0 0 24px; font-size: 14px; }
        .search-bar button { background: #ffb347; border: none; padding: 0 20px; border-radius: 0 24px 24px 0; cursor: pointer; color: #131921; font-weight: bold; }
        .nav-icons { display: flex; gap: 25px; align-items: center; }
        .nav-icons .icon-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; display: flex; align-items: center; gap: 6px; position: relative; transition: 0.2s; }
        .cart-count, .wishlist-count { background: #ffb347; color: #131921; border-radius: 20px; padding: 0 6px; font-size: 12px; font-weight: bold; margin-left: 5px; }
        /* hero + slider */
        .hero { background: linear-gradient(145deg, #232f3e, #131921); padding: 30px 0; margin-bottom: 30px; border-radius: 0 0 30px 30px; }
        .swiper { border-radius: 24px; overflow: hidden; box-shadow: 0 20px 35px rgba(0,0,0,0.2); }
        .swiper-slide img { width: 100%; height: 320px; object-fit: cover; }
        /* product grid */
        .section-title { font-size: 28px; font-weight: 700; margin: 30px 0 20px; border-left: 6px solid #ff8c00; padding-left: 18px; }
        .filters { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 30px; align-items: center; }
        .filter-select, .sort-select { padding: 10px 18px; border-radius: 40px; border: 1px solid #ddd; background: white; font-weight: 500; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 28px; margin-bottom: 50px; }
        .product-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: all 0.3s ease; cursor: pointer; position: relative; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 30px rgba(0,0,0,0.1); }
        .product-img { width: 100%; height: 220px; object-fit: contain; background: #f9f9f9; padding: 20px; }
        .product-info { padding: 16px; }
        .product-title { font-weight: 600; font-size: 1rem; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .price-row { display: flex; align-items: baseline; gap: 8px; margin: 8px 0; }
        .current-price { font-size: 1.4rem; font-weight: 800; color: #c45500; }
        .stock-badge { font-size: 12px; color: #007600; font-weight: 600; }
        .card-actions { display: flex; gap: 10px; margin-top: 12px; }
        .btn-cart, .btn-buy, .wishlist-btn { flex: 1; padding: 8px; border-radius: 30px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-cart { background: #ffd814; color: #0f1111; }
        .btn-buy { background: #ffa41c; color: white; }
        .wishlist-btn { background: #f0f0f0; font-size: 14px; }
        .heart-active { color: #e74c3c; background: #ffe6e6; }
        /* cart sidebar */
        .cart-sidebar { position: fixed; top: 0; right: -450px; width: 450px; max-width: 90vw; height: 100vh; background: white; box-shadow: -5px 0 25px rgba(0,0,0,0.2); z-index: 1000; transition: 0.3s; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .cart-item { display: flex; gap: 12px; margin: 15px 0; align-items: center; }
        .cart-item-img { width: 60px; height: 60px; object-fit: contain; }
        /* checkout modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); z-index: 1100; display: none; align-items: center; justify-content: center; }
        .checkout-modal { background: white; width: 90%; max-width: 800px; border-radius: 28px; padding: 25px; max-height: 90vh; overflow-y: auto; }
        .step { display: none; }
        .step.active-step { display: block; }
        /* chat widget */
        .chat-widget { position: fixed; bottom: 25px; right: 25px; z-index: 1050; }
        .chat-toggle { width: 60px; height: 60px; background: #ff8c00; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); color: white; font-size: 28px; }
        .chat-box { position: absolute; bottom: 75px; right: 0; width: 350px; height: 500px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; flex-direction: column; overflow: hidden; }
        .chat-box.open { display: flex; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; background: #f8f9fa; }
        .message { margin-bottom: 12px; max-width: 80%; }
        .message.admin { margin-left: auto; background: #ff8c00; color: white; border-radius: 18px 18px 4px 18px; padding: 8px 12px; }
        .message.user { background: #e9ecef; border-radius: 18px 18px 18px 4px; }
        .chat-input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; background: white; }
        .chat-input { flex: 1; border: 1px solid #ddd; border-radius: 30px; padding: 8px 15px; outline: none; }
        /* responsive */
        @media (max-width: 768px) { .search-bar { order: 3; width: 100%; margin: 10px 0; } .products-grid { gap: 15px; } .cart-sidebar { width: 100%; } }
        /* rating */
        .rating { color: #ffa41c; font-size: 14px; margin: 5px 0; }
        .discount-badge { background: #cc0c39; color: white; padding: 2px 8px; border-radius: 14px; font-size: 12px; position: absolute; top: 12px; left: 12px; }
        /* promo video */
        .video-section { background: #fff; border-radius: 28px; margin: 40px 0; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .video-grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .video-card { flex: 1; min-width: 240px; border-radius: 20px; overflow: hidden; }
        iframe { width: 100%; height: 200px; border-radius: 16px; }
    </style>
</head>
<body>

<!-- Top Navigation -->
<div class="top-bar">
    <div class="container">
        <div class="logo"><h1>Sohrab Industries ⚡</h1></div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search products...">
            <button id="searchBtn"><i class="fas fa-search"></i></button>
        </div>
        <div class="nav-icons">
            <button class="icon-btn" id="wishlistIconBtn"><i class="far fa-heart"></i> Wishlist <span id="wishlistCountNav" class="wishlist-count">0</span></button>
            <button class="icon-btn" id="cartIconBtn"><i class="fas fa-shopping-cart"></i> Cart <span id="cartCountNav" class="cart-count">0</span></button>
            <button class="icon-btn" id="userMenuBtn"><i class="fas fa-user-circle"></i> Account</button>
        </div>
    </div>
</div>

<!-- Hero Swiper -->
<div class="hero">
    <div class="container">
        <div class="swiper heroSwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="https://placehold.co/1400x320/232f3e/ffa41c?text=Premium+Lighting+Solutions" alt="hero1"></div>
                <div class="swiper-slide"><img src="https://placehold.co/1400x320/2c3e50/f39c12?text=Energy+Saving+LEDs" alt="hero2"></div>
                <div class="swiper-slide"><img src="https://placehold.co/1400x320/1e2a32/e67e22?text=Smart+Home+Essentials" alt="hero3"></div>
            </div>
            <div class="swiper-pagination"></div>
        </div>
    </div>
</div>

<main class="container">
    <div class="filters">
        <select id="categoryFilter" class="filter-select"><option value="">All Categories</option><option>LED Bulbs</option><option>Energy Saving</option><option>Decorative</option><option>Street Light</option><option>Solar</option></select>
        <select id="sortBy" class="sort-select"><option value="default">Sort by: Featured</option><option value="price_asc">Price: Low to High</option><option value="price_desc">Price: High to Low</option><option value="newest">Newest First</option></select>
    </div>
    <div class="products-grid" id="productsGrid"></div>
</main>

<!-- Promotional Videos Section -->
<div class="container video-section">
    <h2 class="section-title">🌟 Brand Showcase</h2>
    <div class="video-grid">
        <div class="video-card"><iframe src="https://www.youtube-nocookie.com/embed/AxwCUJq17dw?autoplay=1&mute=1&loop=1&playlist=AxwCUJq17dw&controls=0&modestbranding=1&rel=0" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>
        <div class="video-card"><iframe src="https://www.youtube.com/embed/-xYxB-3j7lk" frameborder="0" allowfullscreen></iframe></div>
        <div class="video-card"><iframe src="https://www.youtube.com/embed/ySwrZ6p5kuc" frameborder="0" allowfullscreen></iframe></div>
        <div class="video-card"><iframe src="https://www.youtube.com/embed/L2f_ePDpRyw" frameborder="0" allowfullscreen></iframe></div>
    </div>
</div>

<!-- Cart Sidebar -->
<div id="cartSidebar" class="cart-sidebar">
    <div class="cart-header"><h3>Your Cart</h3><button id="closeCartBtn" style="background:none; border:none; font-size:24px;">&times;</button></div>
    <div id="cartItemsList" style="flex:1;"></div>
    <div id="cartSummary" style="border-top:1px solid #ddd; padding:15px 0;"><strong>Total: Rs. <span id="cartTotal">0</span></strong><br><button id="proceedCheckoutBtn" class="btn-cart" style="width:100%; margin-top:10px;">Proceed to Checkout</button></div>
</div>

<!-- Checkout Modal -->
<div id="checkoutModal" class="modal-overlay">
    <div class="checkout-modal">
        <div id="step1" class="step active-step"><h3>Step 1: Review Cart</h3><div id="checkoutCartItems"></div><button class="btn-cart" onclick="nextStep(2)">Next: Shipping</button></div>
        <div id="step2" class="step"><h3>Step 2: Shipping Details</h3><input type="text" id="shippingName" placeholder="Full Name" class="form-control" style="width:100%; padding:12px; margin:10px 0;"><textarea id="shippingAddress" placeholder="Delivery Address" rows="2" style="width:100%; padding:12px;"></textarea><input type="text" id="shippingPhone" placeholder="Phone Number"><button class="btn-cart" onclick="nextStep(3)">Next: Payment</button></div>
        <div id="step3" class="step"><h3>Step 3: Payment Method</h3><select id="paymentMethod" style="width:100%; padding:12px;"><option>Cash on Delivery</option><option>EasyPaisa</option><option>JazzCash</option><option>Bank Transfer</option></select><button class="btn-cart" onclick="nextStep(4)">Review Order</button></div>
        <div id="step4" class="step"><h3>Step 4: Confirm Order</h3><div id="orderSummary"></div><button class="btn-buy" id="placeOrderBtn">Place Order</button></div>
        <button onclick="closeCheckout()" style="margin-top:15px;">Cancel</button>
    </div>
</div>

<!-- Chat Widget -->
<div class="chat-widget">
    <div class="chat-toggle" id="chatToggle"><i class="fas fa-comment-dots"></i></div>
    <div class="chat-box" id="chatBox">
        <div style="background:#ff8c00; color:white; padding:12px; font-weight:bold;">Support Team <span id="adminOnlineBadge" style="float:right;">🟢 Online</span></div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area"><input type="text" id="chatMsgInput" class="chat-input" placeholder="Type message..."><button id="sendChatBtn" style="background:#ff8c00; border:none; border-radius:30px; padding:8px 15px; margin-left:5px;"><i class="fas fa-paper-plane"></i></button></div>
    </div>
</div>

<!-- Wishlist Modal / Page (inline) -->
<div id="wishlistModal" class="modal-overlay" style="z-index:1150;"><div class="checkout-modal"><h2>❤️ Wishlist</h2><div id="wishlistItemsList"></div><button onclick="closeWishlist()">Close</button></div></div>

<!-- Auth Modal (simple) -->
<div id="authModal" class="modal-overlay"><div class="checkout-modal"><h2 id="authTitle">Login / Signup</h2><input type="email" id="authEmail" placeholder="Email"><input type="password" id="authPassword" placeholder="Password"><button id="authActionBtn" class="btn-cart">Login</button><p><a href="#" id="toggleAuthMode">Create an account</a></p><button onclick="closeAuthModal()">Cancel</button></div></div>

<script>
    // SUPABASE CONFIG (same as admin)
    const SUPABASE_URL = 'https://czvxrjtdintvfjcgblxm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6dnhyanRkaW50dmZqY2dibHhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTY4NTcsImV4cCI6MjA5MTQ3Mjg1N30.jc8n6tinfkM7LuEMza1N2yX2u-IeVgOfFcaAtwBjX0g';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentUser = null;
    let products = [];
    let cart = [];
    let wishlist = [];
    let chatSubscription = null;

    // Helper: load cart from local & sync to supabase
    async function syncCart() {
        if(currentUser) {
            const { data } = await supabase.from('carts').select('items').eq('user_id', currentUser.id).maybeSingle();
            if(data && data.items) cart = data.items;
            else await supabase.from('carts').upsert({ user_id: currentUser.id, items: [] });
        } else {
            let local = localStorage.getItem('guest_cart');
            cart = local ? JSON.parse(local) : [];
        }
        renderCartUI();
    }
    async function saveCart() {
        if(currentUser) await supabase.from('carts').upsert({ user_id: currentUser.id, items: cart });
        else localStorage.setItem('guest_cart', JSON.stringify(cart));
        renderCartUI();
    }
    function addToCart(product, qty=1) {
        let existing = cart.find(i=>i.id===product.id);
        if(existing) existing.quantity += qty;
        else cart.push({ id:product.id, name:product.name, price:product.price, image:product.image_url, quantity:qty, stock:product.stock_quantity });
        saveCart();
    }
    function removeFromCart(id) { cart = cart.filter(i=>i.id!==id); saveCart(); }
    function updateQty(id, qty) { let item=cart.find(i=>i.id===id); if(item) item.quantity=Math.max(1,qty); saveCart(); }

    async function loadProducts() {
        let query = supabase.from('products').select('*').eq('is_active', true);
        const { data } = await query;
        products = data || [];
        applyFilters();
    }
    function applyFilters() {
        let filtered = [...products];
        let cat = document.getElementById('categoryFilter').value;
        if(cat) filtered = filtered.filter(p=>p.category===cat);
        let search = document.getElementById('searchInput').value.toLowerCase();
        if(search) filtered = filtered.filter(p=>p.name.toLowerCase().includes(search));
        let sort = document.getElementById('sortBy').value;
        if(sort==='price_asc') filtered.sort((a,b)=>a.price-b.price);
        else if(sort==='price_desc') filtered.sort((a,b)=>b.price-a.price);
        else if(sort==='newest') filtered.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
        renderProducts(filtered);
    }
    function renderProducts(prods) {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = prods.map(p=>`
            <div class="product-card" onclick="openProductDetail('${p.id}')">
                ${p.discount ? `<div class="discount-badge">-${p.discount}%</div>` : ''}
                <img src="${p.image_url || 'https://placehold.co/300x300/eee/333?text=LED'}" class="product-img" onerror="this.src='https://placehold.co/300x300/eee/333?text=Product'">
                <div class="product-info">
                    <div class="product-title">${escapeHtml(p.name)}</div>
                    <div class="rating"><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star-half-alt"></i> 4.5</div>
                    <div class="price-row"><span class="current-price">Rs. ${p.price.toLocaleString()}</span><span class="stock-badge">${p.stock_quantity>0?'In Stock':'Out of Stock'}</span></div>
                    <div class="card-actions">
                        <button class="btn-cart" onclick="event.stopPropagation(); addToCart(${JSON.stringify(p).replace(/"/g, '&quot;')},1)"><i class="fas fa-shopping-cart"></i> Add</button>
                        <button class="btn-buy" onclick="event.stopPropagation(); buyNow('${p.id}')">Buy Now</button>
                        <button class="wishlist-btn ${wishlist.includes(p.id)?'heart-active':''}" onclick="event.stopPropagation(); toggleWishlist('${p.id}')"><i class="fas fa-heart"></i></button>
                    </div>
                </div>
            </div>
        `).join('');
    }
    function toggleWishlist(prodId) {
        if(!currentUser) { openAuthModal(); return; }
        if(wishlist.includes(prodId)) wishlist = wishlist.filter(id=>id!==prodId);
        else wishlist.push(prodId);
        supabase.from('wishlists').upsert({ user_id: currentUser.id, product_ids: wishlist }).then();
        renderWishlistUI();
        applyFilters();
    }
    async function loadWishlist() { if(currentUser) { let {data}=await supabase.from('wishlists').select('product_ids').eq('user_id',currentUser.id).maybeSingle(); wishlist=data?.product_ids||[]; } else wishlist=[]; renderWishlistUI(); }
    function renderWishlistUI() { document.getElementById('wishlistCountNav').innerText=wishlist.length; }
    function renderCartUI() { let total=0; const container=document.getElementById('cartItemsList'); container.innerHTML=cart.map(item=>{ total+=item.price*item.quantity; return `<div class="cart-item"><img src="${item.image||'https://placehold.co/60'}" class="cart-item-img"><div><b>${item.name}</b><br>Rs.${item.price}<br><input type="number" min="1" value="${item.quantity}" style="width:60px;" onchange="updateQty('${item.id}',this.value)"></div><button onclick="removeFromCart('${item.id}')" style="margin-left:auto;">🗑️</button></div>`; }).join(''); document.getElementById('cartTotal').innerText=total; document.getElementById('cartCountNav').innerText=cart.reduce((s,i)=>s+i.quantity,0); }
    function openProductDetail(id) { const p=products.find(p=>p.id===id); if(p) alert(`📦 ${p.name}\nPrice: Rs.${p.price}\nStock: ${p.stock_quantity}\nDescription: High-quality LED lighting.`); } // simplified detail modal
    function buyNow(id) { let prod=products.find(p=>p.id===id); if(prod) { addToCart(prod,1); openCheckout(); } }
    // Checkout steps
    let checkoutCart = [];
    function openCheckout() { checkoutCart = [...cart]; if(checkoutCart.length===0) { alert('Cart empty'); return; } if(!currentUser) { openAuthModal(); return; } document.getElementById('checkoutModal').style.display='flex'; document.getElementById('step1').classList.add('active-step'); document.getElementById('step2').classList.remove('active-step'); document.getElementById('step3').classList.remove('active-step'); document.getElementById('step4').classList.remove('active-step'); renderCheckoutStep1(); }
    function renderCheckoutStep1() { let html='',total=0; checkoutCart.forEach(i=>{ total+=i.price*i.quantity; html+=`<div>${i.name} x${i.quantity} = Rs.${i.price*i.quantity}</div>`; }); html+=`<hr><strong>Total: Rs.${total}</strong>`; document.getElementById('checkoutCartItems').innerHTML=html; }
    function nextStep(step) { document.querySelectorAll('.step').forEach(s=>s.classList.remove('active-step')); document.getElementById(`step${step}`).classList.add('active-step'); if(step===4) { let total=checkoutCart.reduce((s,i)=>s+i.price*i.quantity,0); let shipping=document.getElementById('shippingAddress').value; let name=document.getElementById('shippingName').value; document.getElementById('orderSummary').innerHTML=`<p>Name: ${name}</p><p>Address: ${shipping}</p><p>Payment: ${document.getElementById('paymentMethod').value}</p><p>Total: Rs.${total}</p>`; } }
    async function placeOrder() { if(!currentUser) return; let total=checkoutCart.reduce((s,i)=>s+i.price*i.quantity,0); let orderItems = checkoutCart.map(i=>({name:i.name, quantity:i.quantity, price:i.price})); const { data, error } = await supabase.from('orders').insert({ id: crypto.randomUUID(), user_id: currentUser.id, customer_name: document.getElementById('shippingName').value, delivery_address: document.getElementById('shippingAddress').value, total_amount: total, payment_method: document.getElementById('paymentMethod').value, status: 'pending', payment_status: 'pending', notes: JSON.stringify(orderItems), order_date: new Date().toISOString() }); if(!error) { alert('Order placed successfully!'); cart=[]; saveCart(); closeCheckout(); } else alert('Error: '+error.message); }
    function closeCheckout() { document.getElementById('checkoutModal').style.display='none'; }
    // Chat System (buyer to admin)
    async function initChat() { if(!currentUser) return; const msgsDiv=document.getElementById('chatMessages'); const loadMessages=async()=>{ let {data}=await supabase.from('chat_messages').select('*').or(`and(sender_type.eq.buyer,receiver_type.eq.admin,sender_id.eq.${currentUser.id}),and(sender_type.eq.admin,receiver_type.eq.buyer,receiver_id.eq.${currentUser.id})`).order('created_at'); if(data) { msgsDiv.innerHTML=data.map(m=>`<div class="message ${m.sender_type==='buyer'?'user':'admin'}">${escapeHtml(m.text||'')}<div style="font-size:10px;">${new Date(m.created_at).toLocaleTimeString()}</div></div>`).join(''); msgsDiv.scrollTop=msgsDiv.scrollHeight; } }; if(chatSubscription) supabase.removeChannel(chatSubscription); chatSubscription=supabase.channel('chat_buyer').on('postgres_changes',{event:'INSERT',schema:'public',table:'chat_messages',filter:`receiver_id=eq.${currentUser.id},receiver_type=eq.buyer`},loadMessages).subscribe(); await loadMessages(); document.getElementById('sendChatBtn').onclick=async()=>{ let text=document.getElementById('chatMsgInput').value; if(!text) return; await supabase.from('chat_messages').insert({ sender_id: currentUser.id, sender_type: 'buyer', receiver_id: 'admin', receiver_type: 'admin', text, created_at: new Date().toISOString() }); document.getElementById('chatMsgInput').value=''; loadMessages(); }; }
    // Auth handling
    async function openAuthModal() { document.getElementById('authModal').style.display='flex'; }
    function closeAuthModal() { document.getElementById('authModal').style.display='none'; }
    let isLoginMode=true;
    document.getElementById('toggleAuthMode')?.addEventListener('click',(e)=>{ e.preventDefault(); isLoginMode=!isLoginMode; document.getElementById('authTitle').innerText=isLoginMode?'Login':'Sign Up'; document.getElementById('authActionBtn').innerText=isLoginMode?'Login':'Sign Up'; });
    document.getElementById('authActionBtn').onclick=async()=>{ let email=document.getElementById('authEmail').value, pass=document.getElementById('authPassword').value; if(isLoginMode){ let {data,error}=await supabase.auth.signInWithPassword({email,pass}); if(error) alert(error.message); else { currentUser=data.user; await afterLogin(); } } else { let {data,error}=await supabase.auth.signUp({email,pass}); if(error) alert(error.message); else { alert('Account created! Please login.'); isLoginMode=true; document.getElementById('authTitle').innerText='Login'; document.getElementById('authActionBtn').innerText='Login'; } } };
    async function afterLogin() { closeAuthModal(); await loadWishlist(); await syncCart(); await initChat(); document.getElementById('userMenuBtn').innerHTML=`<i class="fas fa-user-check"></i> ${currentUser.email.split('@')[0]}`; }
    async function checkSession() { let {data:{user}}=await supabase.auth.getUser(); if(user) { currentUser=user; await afterLogin(); } else { currentUser=null; cart=JSON.parse(localStorage.getItem('guest_cart')||'[]'); renderCartUI(); } loadProducts(); }
    document.getElementById('cartIconBtn').onclick=()=>document.getElementById('cartSidebar').classList.add('open');
    document.getElementById('closeCartBtn').onclick=()=>document.getElementById('cartSidebar').classList.remove('open');
    document.getElementById('proceedCheckoutBtn').onclick=()=>{ document.getElementById('cartSidebar').classList.remove('open'); openCheckout(); };
    document.getElementById('placeOrderBtn').onclick=placeOrder;
    document.getElementById('wishlistIconBtn').onclick=()=>{ if(!currentUser) openAuthModal(); else { let modal=document.getElementById('wishlistModal'); modal.style.display='flex'; document.getElementById('wishlistItemsList').innerHTML=products.filter(p=>wishlist.includes(p.id)).map(p=>`<div>${p.name} - Rs.${p.price} <button onclick="toggleWishlist('${p.id}')">Remove</button></div>`).join(''); } };
    function closeWishlist(){ document.getElementById('wishlistModal').style.display='none'; }
    document.getElementById('chatToggle').onclick=()=>document.getElementById('chatBox').classList.toggle('open');
    document.getElementById('searchBtn').onclick=applyFilters;
    document.getElementById('categoryFilter').onchange=applyFilters;
    document.getElementById('sortBy').onchange=applyFilters;
    document.getElementById('searchInput').addEventListener('keyup',(e)=>{if(e.key==='Enter')applyFilters();});
    window.closeCheckout=closeCheckout; window.nextStep=nextStep; window.openCheckout=openCheckout; window.toggleWishlist=toggleWishlist; window.updateQty=updateQty; window.removeFromCart=removeFromCart; window.addToCart=addToCart; window.buyNow=buyNow; window.openProductDetail=openProductDetail; window.closeWishlist=closeWishlist;
    function escapeHtml(str){ return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    document.getElementById('userMenuBtn').onclick=()=>{ if(currentUser) supabase.auth.signOut().then(()=>location.reload()); else openAuthModal(); };
    new Swiper('.heroSwiper', { loop: true, autoplay: { delay: 4000 }, pagination: { el: '.swiper-pagination' } });
    checkSession();
</script>
</body>
</html>
