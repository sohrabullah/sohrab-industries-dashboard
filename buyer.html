<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sohrab Industries | LED & Spare Parts Ecosystem</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #E8B13C;
            --primary-dark: #c99b2e;
            --primary-rgb: 232, 177, 60;
            --secondary: #1a4a3a;
            --dark: #0a2f24;
            --dark-bg: #0a1a15;
            --card-bg: rgba(15, 35, 28, 0.92);
            --border-glow: rgba(232, 177, 60, 0.3);
            --whatsapp-green: #25D366;
            --whatsapp-teal: #075E54;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --success: #1e7e5e;
            --danger: #dc3545;
            --glass-blur: blur(16px);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0b2b22, #05140f);
            min-height: 100vh;
            color: var(--text-white);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1a2a24; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* premium header */
        .buyer-header {
            background: rgba(10, 31, 24, 0.9);
            backdrop-filter: blur(18px);
            padding: 0.8rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-glow);
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #fff, var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .search-bar {
            display: flex;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            border: 1px solid var(--border-glow);
            padding: 0 12px;
            flex: 1;
            max-width: 380px;
        }
        .search-bar input { background: transparent; border: none; padding: 10px; width: 100%; outline: none; color: white; }
        .search-bar button { background: none; border: none; color: var(--primary); cursor: pointer; }

        .header-icons { display: flex; gap: 12px; align-items: center; }
        .header-icons button {
            background: rgba(0, 0, 0, 0.4); border: none; color: white; padding: 8px 14px;
            border-radius: 40px; cursor: pointer; position: relative;
        }
        .cart-count {
            position: absolute; top: -6px; right: -6px; background: var(--danger);
            border-radius: 30px; padding: 2px 6px; font-size: 10px; font-weight: bold;
        }
        #userName { background: rgba(0,0,0,0.4); padding: 6px 16px; border-radius: 40px; font-size: 0.8rem; }
        .logout-btn { background: linear-gradient(145deg, #8b2c2c, #5e1a1a); border: none; padding: 6px 16px; border-radius: 40px; }

        /* Carousel Banner - Pure HTML/CSS/JS */
        .carousel-container {
            position: relative;
            margin: 1.5rem 0 2rem;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
        }
        .carousel-slides {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }
        .carousel-slide {
            min-width: 100%;
            height: 320px;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .carousel-slide::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.6), rgba(0,0,0,0.2));
        }
        .carousel-caption {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 2;
            color: white;
            text-shadow: 0 2px 8px black;
        }
        .carousel-caption h2 { font-size: 1.8rem; font-weight: 800; }
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 12px 18px;
            cursor: pointer;
            border-radius: 50px;
            z-index: 3;
            font-size: 1.2rem;
        }
        .carousel-btn.prev { left: 15px; }
        .carousel-btn.next { right: 15px; }
        .dots {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            z-index: 3;
        }
        .dot {
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            cursor: pointer;
        }
        .dot.active { background: var(--primary); transform: scale(1.2); }

        .buyer-container { max-width: 1400px; margin: 0 auto; padding: 0 5%; position: relative; z-index: 2; }

        /* TABS SYSTEM */
        .tabs {
            display: flex;
            gap: 8px;
            margin: 1.5rem 0 1.2rem;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(12px);
            padding: 6px 12px;
            border-radius: 60px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 8px 20px;
            border-radius: 40px;
            background: transparent;
            border: none;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active { background: var(--primary); color: #0a1f1a; box-shadow: 0 2px 10px rgba(232,177,60,0.4); }
        .tab-content {
            display: none;
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 28px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-glow);
            animation: fadeSlideUp 0.35s ease;
        }
        .tab-content.active { display: block; }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 22px;
        }
        .product-card {
            background: rgba(255,255,255,0.04);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-glow);
            transition: 0.25s;
        }
        .product-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .product-image { height: 170px; display: flex; align-items: center; justify-content: center; background: #0e2921; cursor: pointer; }
        .product-info { padding: 14px; }
        .product-name { font-weight: 700; font-size: 1rem; color: var(--primary); }
        .product-price { font-size: 1.2rem; font-weight: 800; margin: 5px 0; }
        .bulk-badge { background: #e8b13c30; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; display: inline-block; margin-bottom: 6px; }
        .product-actions { display: flex; gap: 8px; margin-top: 10px; }
        .add-to-cart { background: linear-gradient(95deg, var(--primary), #daa520); border: none; border-radius: 40px; padding: 6px 12px; font-weight: 600; cursor: pointer; }

        /* Cart Sidebar */
        .cart-sidebar {
            position: fixed; right: -400px; top: 0; width: 380px; height: 100%;
            background: linear-gradient(145deg, #13352b, #0b261f); z-index: 1000;
            transition: right 0.3s; display: flex; flex-direction: column;
            border-left: 1px solid var(--primary);
        }
        .cart-sidebar.open { right: 0; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; }
        .overlay.active { display: block; }

        /* WhatsApp-style Chat with Attachments */
        .chat-container {
            display: flex;
            height: 520px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--border-glow);
        }
        .chat-user-list { width: 260px; background: #0c261f; border-right: 1px solid var(--border-glow); }
        .chat-user-item { display: flex; align-items: center; padding: 14px; cursor: pointer; border-left: 3px solid transparent; }
        .chat-user-item.active { background: rgba(232,177,60,0.2); border-left-color: var(--primary); }
        .chat-user-avatar { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 12px; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: rgba(10, 35, 28, 0.7); }
        .chat-messages-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; display: flex; flex-direction: column; }
        .message.sent { align-self: flex-end; }
        .message.received { align-self: flex-start; }
        .message-bubble { padding: 10px 14px; border-radius: 20px; word-break: break-word; }
        .message.sent .message-bubble { background: var(--primary); color: #0a1f1a; border-bottom-right-radius: 4px; }
        .message.received .message-bubble { background: rgba(255,255,255,0.1); backdrop-filter: blur(4px); }
        .chat-input-wrapper { display: flex; gap: 8px; padding: 12px; background: #0b2921; border-top: 1px solid var(--border-glow); flex-wrap: wrap; }
        .chat-input { flex: 1; background: rgba(255,255,255,0.1); border: none; border-radius: 30px; padding: 10px 16px; color: white; resize: none; }
        .attach-btn { background: none; border: none; color: var(--primary); font-size: 1.3rem; cursor: pointer; width: 40px; }
        .chat-send-btn { background: var(--primary); border: none; border-radius: 50%; width: 42px; color: #0a1f1a; cursor: pointer; }
        .media-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
        .preview-item { position: relative; width: 60px; height: 60px; border-radius: 12px; overflow: hidden; background: #000; }
        .preview-item img, .preview-item video { width: 100%; height: 100%; object-fit: cover; }

        @media (max-width: 768px) {
            .cart-sidebar { width: 100%; right: -100%; }
            .chat-container { flex-direction: column; }
            .chat-user-list { width: 100%; max-height: 140px; }
            .carousel-slide { height: 220px; }
        }
        .status-badge { padding: 3px 10px; border-radius: 40px; font-size: 0.7rem; font-weight: 600; }
        .toast-notification { position: fixed; bottom: 20px; left: 20px; background: #1e2a24; border-left: 4px solid var(--primary); padding: 10px 18px; border-radius: 12px; z-index: 1100; }
    </style>
</head>
<body>
    <div class="buyer-header">
        <div class="logo"><h1 onclick="location.reload()"><i class="fas fa-industry"></i> Sohrab Industries</h1></div>
        <div class="search-bar"><input type="text" id="searchInput" placeholder="Search products..."><button onclick="searchProducts()"><i class="fas fa-search"></i></button></div>
        <div class="header-icons">
            <button onclick="toggleCart()"><i class="fas fa-shopping-cart"></i><span class="cart-count" id="cartCount">0</span></button>
            <span id="userName"><i class="fas fa-user-circle"></i> Loading...</span>
            <button id="logoutBtn" class="logout-btn">Exit</button>
        </div>
    </div>

    <div class="buyer-container">
        <!-- HTML/CSS/JS Carousel Banner -->
        <div class="carousel-container" id="carousel">
            <div class="carousel-slides" id="carouselSlides"></div>
            <button class="carousel-btn prev" id="prevBtn"><i class="fas fa-chevron-left"></i></button>
            <button class="carousel-btn next" id="nextBtn"><i class="fas fa-chevron-right"></i></button>
            <div class="dots" id="dotsContainer"></div>
        </div>

        <!-- FUNCTIONAL TABS -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="all">📦 All Products</button>
            <button class="tab-btn" data-tab="bulbs">💡 Bulbs</button>
            <button class="tab-btn" data-tab="spare">🔧 Spare Parts</button>
            <button class="tab-btn" data-tab="bulk">📦 Bulk Items</button>
            <button class="tab-btn" data-tab="sample">🧪 Sample Orders</button>
            <button class="tab-btn" data-tab="chat">💬 Live Chat</button>
        </div>

        <div id="allTab" class="tab-content active"><div class="products-grid" id="allProductsGrid"></div></div>
        <div id="bulbsTab" class="tab-content"><div class="products-grid" id="bulbsGrid"></div></div>
        <div id="spareTab" class="tab-content"><div class="products-grid" id="spareGrid"></div></div>
        <div id="bulkTab" class="tab-content"><div class="products-grid" id="bulkGrid"></div></div>
        <div id="sampleTab" class="tab-content"><div class="products-grid" id="sampleGrid"></div></div>
        <div id="chatTab" class="tab-content">
            <h2 style="margin-bottom:12px"><i class="fab fa-whatsapp"></i> Sohrab Industries Support (SIST)</h2>
            <div class="chat-container">
                <div class="chat-user-list"><div class="chat-user-item active" id="adminChatBtn"><div class="chat-user-avatar"><i class="fas fa-headset"></i></div><div><strong>Sohrab Support Team</strong><br><span style="font-size:11px">Online</span></div></div></div>
                <div class="chat-area">
                    <div class="chat-messages-area" id="chatMessagesArea"><div class="empty-state">✨ Send images, videos, products or voice notes</div></div>
                    <div class="chat-input-wrapper">
                        <textarea id="chatInput" class="chat-input" placeholder="Type a message..." rows="1"></textarea>
                        <button class="attach-btn" id="attachImageBtn" title="Send Image"><i class="fas fa-image"></i></button>
                        <button class="attach-btn" id="attachVideoBtn" title="Send Video"><i class="fas fa-video"></i></button>
                        <button class="attach-btn" id="attachProductBtn" title="Share Product"><i class="fas fa-box-open"></i></button>
                        <button class="attach-btn" id="voiceRecordBtn" title="Voice Message (simulated)"><i class="fas fa-microphone"></i></button>
                        <button class="chat-send-btn" id="sendChatBtn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    <div id="mediaPreview" class="media-preview" style="padding: 0 12px 8px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cartSidebar"><div class="cart-header"><h3>🛒 Your Cart</h3><button onclick="toggleCart()">✖</button></div><div id="cartItemsList" class="cart-items"></div><div class="cart-footer"><div>Total: Rs. <span id="cartTotal">0</span></div><button class="checkout-btn" onclick="checkout()">Place Order</button></div></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function(){
            const SUPABASE_URL = 'https://czvxrjtdintvfjcgblxm.supabase.co';
            const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6dnhyanRkaW50dmZqY2dibHhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTY4NTcsImV4cCI6MjA5MTQ3Mjg1N30.jc8n6tinfkM7LuEMza1N2yX2u-IeVgOfFcaAtwBjX0g';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            let currentUser = null;
            let cart = [];
            let allProducts = [];
            let pendingMedia = null; // for chat attachments

            // Helper
            function showToast(msg, isErr=false) { const t = document.createElement('div'); t.className='toast-notification'; t.innerHTML= isErr ? `⚠️ ${msg}` : `✅ ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }

            // Carousel Data
            const slides = [
                { bg: 'linear-gradient(135deg, #0a2f24, #1a4a3a)', title: 'Premium LED Bulbs', desc: 'Energy efficient, long life' },
                { bg: 'linear-gradient(135deg, #2c2b1f, #5e4b2b)', title: 'Industrial Spare Parts', desc: 'Drivers, PCBs, Chips - Bulk only' },
                { bg: 'linear-gradient(135deg, #1f3e2c, #0f281d)', title: 'Bulk Orders Welcome', desc: 'Minimum order quantity applies' }
            ];
            let currentSlide = 0;
            function buildCarousel(){
                const container = document.getElementById('carouselSlides');
                const dotsDiv = document.getElementById('dotsContainer');
                container.innerHTML = '';
                slides.forEach((s,idx)=>{
                    const slideDiv = document.createElement('div');
                    slideDiv.className = 'carousel-slide';
                    slideDiv.style.background = s.bg;
                    slideDiv.innerHTML = `<div class="carousel-caption"><h2>${s.title}</h2><p>${s.desc}</p></div>`;
                    container.appendChild(slideDiv);
                    const dot = document.createElement('div');
                    dot.className = `dot ${idx===0?'active':''}`;
                    dot.addEventListener('click',()=>goToSlide(idx));
                    dotsDiv.appendChild(dot);
                });
                updateCarousel();
            }
            function updateCarousel(){ document.querySelector('.carousel-slides').style.transform = `translateX(-${currentSlide * 100}%)`; document.querySelectorAll('.dot').forEach((d,i)=>{ if(i===currentSlide) d.classList.add('active'); else d.classList.remove('active'); }); }
            function goToSlide(idx){ currentSlide = idx; updateCarousel(); }
            document.getElementById('prevBtn')?.addEventListener('click',()=>{ currentSlide = (currentSlide-1+slides.length)%slides.length; updateCarousel(); });
            document.getElementById('nextBtn')?.addEventListener('click',()=>{ currentSlide = (currentSlide+1)%slides.length; updateCarousel(); });
            
            // Auth & Data
            async function checkAuth(){
                const {data:{user}} = await supabase.auth.getUser();
                if(!user){ window.location.href='buyer-auth.html'; return; }
                currentUser = user;
                document.getElementById('userName').innerHTML = `<i class="fas fa-user-circle"></i> ${user.email.split('@')[0]}`;
                await ensureBuyer();
                await loadProducts();
                loadCart();
                setupChatRealtime();
                loadChatMessages();
            }
            async function ensureBuyer(){ const {data:ex}=await supabase.from('buyers').select('id').eq('id',currentUser.id); if(!ex||ex.length===0) await supabase.from('buyers').insert([{ id:currentUser.id, email:currentUser.email, full_name:currentUser.email.split('@')[0], phone:'', address:'', total_orders:0, total_spent:0 }]); }
            
            async function loadProducts(){
                const {data} = await supabase.from('products').select('*').eq('is_active',true);
                if(data && data.length) allProducts = data;
                else {
                    allProducts = [
                        { id:'p1', name:'LED Bulb 12W Ultra', category:'Bulbs', price:180, stock:120, min_order_qty:1, bulk_only:false, sample_available:true },
                        { id:'p2', name:'LED Bulb 9W Slim', category:'Bulbs', price:150, stock:200, min_order_qty:1, bulk_only:false, sample_available:true },
                        { id:'p3', name:'LED Driver 36W', category:'Spare Parts', price:350, stock:500, min_order_qty:50, bulk_only:true, sample_available:false },
                        { id:'p4', name:'SMD PCB Board', category:'Spare Parts', price:120, stock:1000, min_order_qty:100, bulk_only:true, sample_available:false },
                        { id:'p5', name:'Industrial Flood Light 100W', category:'Bulbs', price:1850, stock:45, min_order_qty:1, bulk_only:false },
                        { id:'p6', name:'LED Chip 5730 (100pcs)', category:'Spare Parts', price:850, stock:200, min_order_qty:10, bulk_only:true },
                        { id:'p7', name:'Bulk LED Bulb 12W (50 pcs)', category:'Bulbs', price:7500, stock:30, min_order_qty:50, bulk_only:true, sample_available:false }
                    ];
                }
                renderAllTabs();
            }
            function renderAllTabs(){
                const bulbs = allProducts.filter(p=>p.category==='Bulbs');
                const spare = allProducts.filter(p=>p.category==='Spare Parts');
                const bulkItems = allProducts.filter(p=>p.bulk_only===true);
                const sampleItems = allProducts.filter(p=>p.sample_available===true);
                document.getElementById('allProductsGrid').innerHTML = allProducts.map(p=>productCard(p)).join('');
                document.getElementById('bulbsGrid').innerHTML = bulbs.map(p=>productCard(p)).join('');
                document.getElementById('spareGrid').innerHTML = spare.map(p=>productCard(p)).join('');
                document.getElementById('bulkGrid').innerHTML = bulkItems.map(p=>productCard(p,true)).join('');
                document.getElementById('sampleGrid').innerHTML = sampleItems.map(p=>productCard(p)).join('');
            }
            function productCard(p, isBulkView=false){
                const moqMsg = p.bulk_only ? `📦 MOQ: ${p.min_order_qty}` : '';
                return `<div class="product-card"><div class="product-image" onclick="viewProduct('${p.id}')"><i class="fas fa-lightbulb" style="font-size:2rem;color:var(--primary);"></i></div><div class="product-info"><div class="product-name">${escapeHtml(p.name)}</div><div class="product-price">Rs. ${(p.price||0).toLocaleString()}</div><div class="bulk-badge">${moqMsg}</div><div class="product-actions"><button class="add-to-cart" onclick="addToCart('${p.id}','${escapeHtml(p.name).replace(/'/g,"\\'")}',${p.price}, ${p.min_order_qty||1})">Add to Cart</button></div></div></div>`;
            }
            window.viewProduct = (id)=>{ let p=allProducts.find(x=>x.id===id); if(p) Swal.fire({title:p.name,html:`<p>Price: Rs.${p.price}</p><p>Bulk: ${p.bulk_only?'Yes (MOQ '+p.min_order_qty+')':'No'}</p>`,background:'#1c3d33',color:'white'}); };
            window.addToCart = (id,name,price,moq=1)=>{ let item = cart.find(i=>i.id===id); if(item) item.quantity += moq; else cart.push({id,name,price,quantity:moq}); saveCart(); showToast(`${name} added`); };
            function saveCart(){ localStorage.setItem(`cart_${currentUser.id}`,JSON.stringify(cart)); updateCartUI(); }
            function loadCart(){ const s = localStorage.getItem(`cart_${currentUser.id}`); if(s) cart = JSON.parse(s); updateCartUI(); }
            function updateCartUI(){ const count = cart.reduce((s,i)=>s+i.quantity,0); document.getElementById('cartCount').innerHTML = count; const total = cart.reduce((s,i)=>s+(i.price*i.quantity),0); document.getElementById('cartTotal').innerHTML = total.toLocaleString(); const container = document.getElementById('cartItemsList'); if(!container) return; if(cart.length===0){ container.innerHTML='<div class="empty-state">Cart empty</div>'; return; } container.innerHTML = cart.map(i=>`<div style="display:flex; justify-content:space-between; padding:8px;"><div>${escapeHtml(i.name)} x${i.quantity}</div><div>Rs.${(i.price*i.quantity).toLocaleString()}</div><button onclick="removeCartItem('${i.id}')">🗑️</button></div>`).join(''); }
            window.removeCartItem = (id)=>{ cart = cart.filter(i=>i.id!==id); saveCart(); updateCartUI(); };
            window.toggleCart = ()=>{ document.getElementById('cartSidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); };
            window.checkout = ()=>{ if(cart.length===0) return showToast('Cart empty',true); Swal.fire({ title:'Order Confirmation', html:`<textarea id="orderAddress" placeholder="Delivery Address" class="swal2-textarea"></textarea><select id="paymentMethod"><option>Cash on Delivery</option><option>Bank Transfer</option></select>`, preConfirm:()=>{ const addr = document.getElementById('orderAddress').value; if(!addr) Swal.showValidationMessage('Address required'); return {addr,method:document.getElementById('paymentMethod').value}; } }).then(async(result)=>{ if(result.isConfirmed){ const total = cart.reduce((s,i)=>s+(i.price*i.quantity),0); const {error} = await supabase.from('orders').insert([{ user_id:currentUser.id, user_type:'buyer', order_date:new Date().toISOString(), total_amount:total, status:'pending', payment_method:result.value.method, delivery_address:result.value.addr, notes:JSON.stringify({items:cart}) }]); if(error) showToast(error.message,true); else { cart = []; saveCart(); toggleCart(); showToast('Order placed!'); } } }); };
            
            // CHAT SYSTEM WITH MEDIA & PRODUCT SHARING
            let chatMessages = [];
            async function loadChatMessages(){
                const {data} = await supabase.from('chat_messages').select('*').or(`and(sender_id.eq.${currentUser.id},sender_type.eq.buyer),and(receiver_id.eq.${currentUser.id},receiver_type.eq.buyer)`).order('created_at',{ascending:true});
                chatMessages = data || [];
                const container = document.getElementById('chatMessagesArea');
                if(!container) return;
                if(chatMessages.length===0){ container.innerHTML='<div class="empty-state">💬 Start chatting with Sohrab Support Team (SIST)</div>'; return; }
                container.innerHTML = chatMessages.map(m=>{
                    const isSent = m.sender_id === currentUser.id;
                    let content = '';
                    if(m.text) content = `<div class="message-text">${escapeHtml(m.text)}</div>`;
                    if(m.media_url) content += `<div><a href="${m.media_url}" target="_blank"><i class="fas fa-file"></i> View media</a></div>`;
                    if(m.product_id){
                        const prod = allProducts.find(p=>p.id===m.product_id);
                        content += `<div style="background:#00000030; border-radius:12px; padding:6px;"><strong>📦 Product: ${prod?.name||'Item'}</strong><br>Price: Rs.${prod?.price}</div>`;
                    }
                    return `<div class="message ${isSent ? 'sent' : 'received'}"><div class="message-bubble">${content}<div class="message-time">${new Date(m.created_at).toLocaleTimeString()}</div></div></div>`;
                }).join('');
                container.scrollTop = container.scrollHeight;
            }
            async function sendChatMessage(text, mediaFile=null, productId=null){
                let mediaUrl = null;
                if(mediaFile){
                    const ext = mediaFile.name.split('.').pop();
                    const filePath = `chat_media/${currentUser.id}_${Date.now()}.${ext}`;
                    const {error:upErr} = await supabase.storage.from('chat_attachments').upload(filePath, mediaFile);
                    if(!upErr) { const {data:{publicUrl}} = supabase.storage.from('chat_attachments').getPublicUrl(filePath); mediaUrl = publicUrl; }
                    else showToast('Upload failed',true);
                }
                await supabase.from('chat_messages').insert([{ sender_id:currentUser.id, sender_type:'buyer', receiver_id:'admin', receiver_type:'admin', text:text||null, media_url:mediaUrl, product_id:productId||null, created_at:new Date().toISOString() }]);
                loadChatMessages();
            }
            function setupChatRealtime(){ supabase.channel('buyer-chat').on('postgres_changes',{ event:'INSERT', schema:'public', table:'chat_messages', filter:`receiver_id=eq.${currentUser.id}` },()=>loadChatMessages()).subscribe(); }
            document.getElementById('sendChatBtn')?.addEventListener('click',()=>{ let txt=document.getElementById('chatInput').value.trim(); if(txt) sendChatMessage(txt); document.getElementById('chatInput').value=''; });
            document.getElementById('attachImageBtn')?.addEventListener('click',()=>{ let input=document.createElement('input'); input.type='file'; input.accept='image/*'; input.onchange=e=>{ if(e.target.files[0]) sendChatMessage('📷 Image shared', e.target.files[0]); }; input.click(); });
            document.getElementById('attachVideoBtn')?.addEventListener('click',()=>{ let input=document.createElement('input'); input.type='file'; input.accept='video/*'; input.onchange=e=>{ if(e.target.files[0]) sendChatMessage('🎥 Video shared', e.target.files[0]); }; input.click(); });
            document.getElementById('attachProductBtn')?.addEventListener('click',async()=>{ const {value:pid}=await Swal.fire({ title:'Share Product', input:'select', inputOptions:allProducts.reduce((acc,p)=>(acc[p.id]=p.name,acc),{}), inputPlaceholder:'Select product', showCancelButton:true }); if(pid) sendChatMessage(`Shared product: ${allProducts.find(p=>p.id===pid)?.name}`, null, pid); });
            document.getElementById('voiceRecordBtn')?.addEventListener('click',()=>{ showToast('🎙️ Voice recording simulated — would use MediaRecorder API'); sendChatMessage('🎤 Voice note (simulated)'); });
            
            // Tab switching logic
            document.querySelectorAll('.tab-btn').forEach(btn=>{
                btn.addEventListener('click',()=>{
                    document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
                    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
                    btn.classList.add('active');
                    const tabId = btn.dataset.tab + 'Tab';
                    document.getElementById(tabId).classList.add('active');
                    if(btn.dataset.tab === 'chat') loadChatMessages();
                });
            });
            window.searchProducts = () => { const term = document.getElementById('searchInput').value.toLowerCase(); const filtered = allProducts.filter(p=>p.name.toLowerCase().includes(term)); document.getElementById('allProductsGrid').innerHTML = filtered.map(p=>productCard(p)).join(''); };
            function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
            document.getElementById('logoutBtn')?.addEventListener('click',async()=>{ await supabase.auth.signOut(); window.location.href='buyer-auth.html'; });
            buildCarousel();
            checkAuth();
        })();
    </script>
</body>
</html>
