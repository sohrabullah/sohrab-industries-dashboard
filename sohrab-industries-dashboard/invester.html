<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Sohrab Industries | Investor Portal</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary px-4">
        <span class="navbar-brand">Sohrab Investor Portal</span>
        <button onclick="logout()" class="btn btn-outline-light btn-sm">Logout</button>
    </nav>

    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <h6>Total Investment</h6>
                        <h3 id="stat-investment">PKR 0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-info">
                    <div class="card-body">
                        <h6>Total Profit</h6>
                        <h3 id="stat-profit">PKR 0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-warning">
                    <div class="card-body">
                        <h6>Available Balance</h6>
                        <h3 id="stat-balance">PKR 0</h3>
                    </div>
                </div>
            </div>
        </div>

        <ul class="nav nav-tabs" id="investorTabs">
            <li class="nav-item"><a class="nav-link active" href="#history">Investment History</a></li>
            <li class="nav-item"><a class="nav-link" href="#shop">Buy Bulbs</a></li>
            <li class="nav-item"><a class="nav-link" href="#withdraw">Withdrawal</a></li>
        </ul>

        <div class="tab-content bg-white p-3 border border-top-0">
            <div id="history" class="tab-pane active">
                <table class="table table-hover mt-3">
                    <thead><tr><th>Date</th><th>Amount</th><th>Type</th><th>Status</th></tr></thead>
                    <tbody id="invest-history-body"></tbody>
                </table>
            </div>

            <div id="shop" class="tab-pane fade">
                <div class="row mt-3" id="product-list">
                    </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        // Load investor data on start
        async function loadInvestorData() {
            const user = (await supabase.auth.getUser()).data.user;
            const { data: profile } = await supabase
                .from('investors')
                .select('*')
                .eq('email', user.email)
                .single();
            
            document.getElementById('stat-investment').innerText = `PKR ${profile.total_investment}`;
            document.getElementById('stat-profit').innerText = `PKR ${profile.total_profit}`;
            document.getElementById('stat-balance').innerText = `PKR ${profile.available_balance}`;
        }
    </script>
</body>
</html>
