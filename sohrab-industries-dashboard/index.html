<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohrab Industries - Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <h1>💡 Sohrab Industries</h1>
            <p>Quality Bulbs & Investment Opportunities</p>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="form-container active">
            <h2>Login to Your Account</h2>
            <form id="login">
                <input type="email" id="loginEmail" placeholder="Email Address" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <p class="toggle-text">Don't have an account? <a href="#" onclick="showSignup()">Sign Up</a></p>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="form-container">
            <h2>Create New Account</h2>
            <form id="signup">
                <input type="text" id="fullName" placeholder="Full Name" required>
                <input type="email" id="signupEmail" placeholder="Email Address" required>
                <input type="tel" id="phone" placeholder="Phone Number (Optional)">
                <input type="password" id="signupPassword" placeholder="Password (min 6 characters)" required>
                <button type="submit">Sign Up</button>
            </form>
            <p class="toggle-text">Already have an account? <a href="#" onclick="showLogin()">Login</a></p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize Supabase
        const SUPABASE_URL = 'https://czvxrjtdintvfjcgblxm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6dnhyanRkaW50dmZqY2dibHhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTY4NTcsImV4cCI6MjA5MTQ3Mjg1N30.jc8n6tinfkM7LuEMza1N2yX2u-IeVgOfFcaAtwBjX0g';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function showSignup() {
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('signupForm').classList.add('active');
        }

        function showLogin() {
            document.getElementById('signupForm').classList.remove('active');
            document.getElementById('loginForm').classList.add('active');
        }

        // Handle Login
        document.getElementById('login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                alert('Login failed: ' + error.message);
            } else {
                // Store user info
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'dashboard.html';
            }
        });

        // Handle Signup
        document.getElementById('signup').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('signupEmail').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('signupPassword').value;

            // Create auth user
            const { data: authData, error: authError } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: fullName,
                        phone: phone
                    }
                }
            });

            if (authError) {
                alert('Signup failed: ' + authError.message);
                return;
            }

            // Add to investors table
            const { error: dbError } = await supabase
                .from('investors')
                .insert([
                    {
                        id: authData.user.id,
                        email: email,
                        full_name: fullName,
                        phone: phone
                    }
                ]);

            if (dbError) {
                console.error('Error saving to investors table:', dbError);
            }

            alert('Account created successfully! Please login.');
            showLogin();
            document.getElementById('signup').reset();
        });
    </script>
</body>
</html>
