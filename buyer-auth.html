<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohrab Industries | Buyer Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0B2B26 0%, #1A4D3E 50%, #0F3B32 100%);
            min-height: 100vh;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: #1E4E3E; }
        .logo i { color: #E8B13C; }
        .nav-links { display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: #1E4E3E; font-weight: 600; }
        .nav-links a:hover { color: #E8B13C; }
        .main-container { max-width: 1200px; margin: 0 auto; padding: 2rem 5%; display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: center; }
        .hero-content h1 { font-size: 2.5rem; color: white; }
        .hero-content h1 span { color: #E8B13C; }
        .hero-content p { color: rgba(255,255,255,0.9); margin-top: 1rem; }
        .auth-card { background: white; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .card-header { background: linear-gradient(112deg, #E8B13C 0%, #f0c45a 100%); padding: 1.5rem; text-align: center; }
        .card-header h2 { color: #1E4E3E; }
        .card-body { padding: 2rem; }
        .toggle-buttons { display: flex; gap: 1rem; margin-bottom: 2rem; background: #f0f2f5; padding: 0.3rem; border-radius: 3rem; }
        .toggle-btn { flex: 1; padding: 0.7rem; border: none; border-radius: 2rem; font-weight: 600; cursor: pointer; background: transparent; }
        .toggle-btn.active { background: #E8B13C; color: #1E4E3E; }
        .form-group { margin-bottom: 1rem; }
        .form-group input { width: 100%; padding: 0.8rem 1rem; border: 1px solid #ddd; border-radius: 0.8rem; font-size: 1rem; }
        .form-group input:focus { outline: none; border-color: #E8B13C; }
        .btn { width: 100%; padding: 0.8rem; background: #E8B13C; color: #1E4E3E; border: none; border-radius: 2rem; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 0.5rem; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .toggle-link { text-align: center; margin-top: 1rem; font-size: 0.85rem; }
        .toggle-link a { color: #E8B13C; text-decoration: none; font-weight: 600; cursor: pointer; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 40px; color: white; z-index: 1000; text-align: center; }
        .toast.success { background: #28a745; }
        .toast.error { background: #dc3545; }
        @media (max-width: 768px) { .main-container { grid-template-columns: 1fr; } .hero-content h1 { font-size: 1.8rem; text-align: center; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-lightbulb"></i> Sohrab Industries</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="investor-auth.html">Investor</a>
            <a href="buyer-auth.html">Buyer</a>
            <a href="admin-auth.html">Admin</a>
        </div>
    </nav>

    <div class="main-container">
        <div class="hero-content">
            <h1>Shop Premium <span>Quality Bulbs</span> in PKR</h1>
            <p>Free delivery on orders over PKR 2000 | 2 years warranty</p>
        </div>

        <div class="auth-card">
            <div class="card-header"><h2>Buyer Portal</h2><p>Login or Create Account</p></div>
            <div class="card-body">
                <div class="toggle-buttons">
                    <button class="toggle-btn" id="loginTabBtn">Login</button>
                    <button class="toggle-btn active" id="signupTabBtn">Sign Up</button>
                </div>

                <div id="signupForm">
                    <div class="form-group"><input type="text" id="signupName" placeholder="Full Name"></div>
                    <div class="form-group"><input type="email" id="signupEmail" placeholder="Email Address"></div>
                    <div class="form-group"><input type="tel" id="signupPhone" placeholder="Phone Number"></div>
                    <div class="form-group"><input type="text" id="signupAddress" placeholder="Delivery Address"></div>
                    <div class="form-group"><input type="password" id="signupPassword" placeholder="Password (min 6 characters)"></div>
                    <div class="form-group"><input type="password" id="signupConfirm" placeholder="Confirm Password"></div>
                    <button class="btn" id="signupBtn">Create Buyer Account</button>
                </div>

                <div id="loginForm" style="display: none;">
                    <div class="form-group"><input type="email" id="loginEmail" placeholder="Email Address"></div>
                    <div class="form-group"><input type="password" id="loginPassword" placeholder="Password"></div>
                    <button class="btn" id="loginBtn">Login to Shop</button>
                </div>

                <div class="toggle-link"><a id="toggleLink">Already have an account? Login →</a></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://czvxrjtdintvfjcgblxm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6dnhyanRkaW50dmZqY2dibHhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTY4NTcsImV4cCI6MjA5MTQ3Mjg1N30.jc8n6tinfkM7LuEMza1N2yX2u-IeVgOfFcaAtwBjX0g';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Elements
        const signupForm = document.getElementById('signupForm');
        const loginForm = document.getElementById('loginForm');
        const loginTab = document.getElementById('loginTabBtn');
        const signupTab = document.getElementById('signupTabBtn');
        const toggleLink = document.getElementById('toggleLink');

        // Toggle functions
        function showLogin() {
            signupForm.style.display = 'none';
            loginForm.style.display = 'block';
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            toggleLink.innerHTML = "Don't have an account? Sign Up →";
        }

        function showSignup() {
            loginForm.style.display = 'none';
            signupForm.style.display = 'block';
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            toggleLink.innerHTML = "Already have an account? Login →";
        }

        // Attach events
        loginTab.onclick = showLogin;
        signupTab.onclick = showSignup;
        toggleLink.onclick = function() {
            if (loginForm.style.display === 'none') {
                showLogin();
            } else {
                showSignup();
            }
        };

        // Toast message
        function showToast(msg, isError) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : 'success'}`;
            toast.innerHTML = isError ? `❌ ${msg}` : `✅ ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // SIGNUP
        document.getElementById('signupBtn').onclick = async function() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const phone = document.getElementById('signupPhone').value.trim();
            const address = document.getElementById('signupAddress').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;

            if (!name || !email || !phone || !address || !password) {
                showToast('Please fill all fields', true);
                return;
            }
            if (password !== confirm) {
                showToast('Passwords do not match', true);
                return;
            }
            if (password.length < 6) {
                showToast('Password must be at least 6 characters', true);
                return;
            }

            const btn = this;
            btn.disabled = true;
            btn.innerHTML = 'Creating...';

            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: { full_name: name, phone: phone, address: address }
                }
            });

            if (error) {
                showToast(error.message, true);
                btn.disabled = false;
                btn.innerHTML = 'Create Buyer Account';
                return;
            }

            if (data.user) {
                // Try to save to buyers table (optional)
                try {
                    await supabase.from('buyers').insert([{
                        id: data.user.id,
                        email: email,
                        full_name: name,
                        phone: phone,
                        address: address
                    }]);
                } catch(e) {
                    console.log('Buyers table not ready');
                }
                
                showToast('Account created! Please login.', false);
                document.querySelectorAll('#signupForm input').forEach(i => i.value = '');
                showLogin();
            }

            btn.disabled = false;
            btn.innerHTML = 'Create Buyer Account';
        };

        // LOGIN
        document.getElementById('loginBtn').onclick = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showToast('Please enter email and password', true);
                return;
            }

            const btn = this;
            btn.disabled = true;
            btn.innerHTML = 'Logging in...';

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                showToast('Invalid email or password', true);
                btn.disabled = false;
                btn.innerHTML = 'Login to Shop';
                return;
            }

            if (data.user) {
                localStorage.setItem('user', JSON.stringify(data.user));
                showToast('Login successful! Redirecting...', false);
                setTimeout(() => {
                    window.location.href = 'buyer.html';
                }, 1500);
            }
        };
    </script>
</body>
</html>
