<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohrab Industries | Buyer Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0B2B26 0%, #1A4D3E 50%, #0F3B32 100%);
            min-height: 100vh;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(255,255,255,0.95);
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; font-weight: 700; color: #1E4E3E; }
        .logo i { color: #E8B13C; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { text-decoration: none; color: #1E4E3E; font-weight: 500; transition: color 0.3s; }
        .nav-links a:hover { color: #E8B13C; }
        .container { max-width: 520px; margin: 2rem auto; padding: 0 1rem; }
        .auth-card { background: white; border-radius: 2rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3); }
        .card-header { background: linear-gradient(112deg, #E8B13C 0%, #f0c45a 100%); padding: 2rem; text-align: center; color: #1E4E3E; }
        .card-header i { font-size: 3rem; color: #1E4E3E; margin-bottom: 0.5rem; }
        .card-header h2 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        .card-header p { font-size: 0.9rem; opacity: 0.9; }
        .card-body { padding: 2rem; }
        .toggle-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: #f0f2f5;
            padding: 0.5rem;
            border-radius: 3rem;
        }
        .toggle-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }
        .toggle-btn.active { background: #E8B13C; color: #1E4E3E; }
        .form-wrapper { transition: all 0.3s ease; }
        .form-group { margin-bottom: 1.2rem; position: relative; }
        .form-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #9CA3AF; }
        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            border: 1.5px solid #E2E8F0;
            border-radius: 1rem;
            font-size: 1rem;
        }
        .form-group input:focus { outline: none; border-color: #E8B13C; }
        .btn-primary {
            width: 100%;
            padding: 0.9rem;
            background: #E8B13C;
            color: #1E4E3E;
            border: none;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(232,177,60,0.3); }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }
        .toggle-link { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #666; }
        .toggle-link a { color: #E8B13C; text-decoration: none; font-weight: 600; cursor: pointer; }
        .back-home { text-align: center; margin-top: 1rem; }
        .back-home a { color: white; text-decoration: none; font-size: 0.9rem; opacity: 0.8; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            text-align: center;
            font-weight: 500;
        }
        .toast.success { background: #28a745; }
        .toast.error { background: #dc3545; }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
        @media (max-width: 768px) { .navbar { flex-direction: column; gap: 15px; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-lightbulb"></i><span>Sohrab Industries</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="investor-auth.html">Investor</a>
            <a href="buyer-auth.html">Buyer</a>
            <a href="admin-auth.html">Admin</a>
        </div>
    </nav>

    <div class="container">
        <div class="auth-card">
            <div class="card-header">
                <i class="fas fa-shopping-cart"></i>
                <h2>Buyer Portal</h2>
                <p>Shop premium quality bulbs</p>
            </div>
            <div class="card-body">
                <div class="toggle-buttons">
                    <button class="toggle-btn" id="loginTabBtn">Login</button>
                    <button class="toggle-btn active" id="signupTabBtn">Sign Up</button>
                </div>

                <!-- Signup Form (Visible by default) -->
                <div id="signupForm" class="form-wrapper">
                    <div class="form-group"><i class="fas fa-user"></i><input type="text" id="fullName" placeholder="Full Name" required></div>
                    <div class="form-group"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="Email Address" required></div>
                    <div class="form-group"><i class="fas fa-phone"></i><input type="tel" id="phone" placeholder="Phone Number" required></div>
                    <div class="form-group"><i class="fas fa-map-marker-alt"></i><input type="text" id="address" placeholder="Delivery Address" required></div>
                    <div class="form-group"><i class="fas fa-lock"></i><input type="password" id="password" placeholder="Password (min 6 characters)" required></div>
                    <div class="form-group"><i class="fas fa-check-circle"></i><input type="password" id="confirmPassword" placeholder="Confirm Password" required></div>
                    <button class="btn-primary" id="signupBtn"><i class="fas fa-user-plus"></i> Create Buyer Account</button>
                </div>

                <!-- Login Form (Hidden by default) -->
                <div id="loginForm" class="form-wrapper" style="display: none;">
                    <div class="form-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="Email Address" required></div>
                    <div class="form-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Password" required></div>
                    <button class="btn-primary" id="loginBtn"><i class="fas fa-store"></i> Login to Shop</button>
                </div>

                <div class="toggle-link">
                    <a id="toggleLink">Already have an account? Login →</a>
                </div>
                <div class="back-home"><a href="index.html">← Back to Home</a></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://czvxrjtdintvfjcgblxm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6dnhyanRkaW50dmZqY2dibHhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTY4NTcsImV4cCI6MjA5MTQ3Mjg1N30.jc8n6tinfkM7LuEMza1N2yX2u-IeVgOfFcaAtwBjX0g';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : 'success'}`;
            toast.innerHTML = isError ? `❌ ${message}` : `✅ ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        const signupForm = document.getElementById('signupForm');
        const loginForm = document.getElementById('loginForm');
        const loginTab = document.getElementById('loginTabBtn');
        const signupTab = document.getElementById('signupTabBtn');
        const toggleLink = document.getElementById('toggleLink');

        function showLoginForm() {
            signupForm.style.display = 'none';
            loginForm.style.display = 'block';
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            toggleLink.innerHTML = "Don't have an account? Sign Up →";
        }

        function showSignupForm() {
            loginForm.style.display = 'none';
            signupForm.style.display = 'block';
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            toggleLink.innerHTML = "Already have an account? Login →";
        }

        loginTab.addEventListener('click', showLoginForm);
        signupTab.addEventListener('click', showSignupForm);
        toggleLink.addEventListener('click', () => {
            if (loginForm.style.display === 'none') showLoginForm();
            else showSignupForm();
        });

        // SIGNUP
        document.getElementById('signupBtn').addEventListener('click', async () => {
            const btn = document.getElementById('signupBtn');
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!fullName || !email || !phone || !address || !password) {
                showToast('Please fill all fields', true);
                return;
            }
            if (password !== confirm) { showToast('Passwords do not match', true); return; }
            if (password.length < 6) { showToast('Password must be at least 6 characters', true); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Creating Account...';

            try {
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email, password,
                    options: { data: { full_name: fullName, phone, address, role: 'buyer' } }
                });

                if (authError) { showToast(authError.message, true); return; }

                if (authData.user) {
                    await supabase.from('buyers').insert([{
                        id: authData.user.id, email, full_name: fullName, phone, address,
                        status: 'approved', is_approved: true, created_at: new Date().toISOString()
                    }]);
                    showToast('Account created successfully! Please login.', false);
                    
                    // Clear form
                    document.querySelectorAll('#signupForm input').forEach(i => i.value = '');
                    showLoginForm();
                }
            } catch (error) {
                showToast('An error occurred. Please try again.', true);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Buyer Account';
            }
        });

        // LOGIN
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) { showToast('Please enter email and password', true); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Logging in...';

            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                showToast('Invalid email or password', true);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-store"></i> Login to Shop';
                return;
            }

            if (data.user) {
                localStorage.setItem('user', JSON.stringify(data.user));
                localStorage.setItem('userType', 'buyer');
                showToast('Login successful! Redirecting...', false);
                setTimeout(() => window.location.href = 'buyer.html', 1500);
            }
        });
    </script>
</body>
</html>
