<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohrab Industries | Buyer Portal</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0B2B26, #1A4D3E);
            min-height: 100vh;
        }

        .hidden { display: none; }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 1rem 5%;
            background: white;
        }

        .logo { font-weight: 800; }

        .main-container {
            max-width: 1200px;
            margin: auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .hero-content h1 { color: white; }

        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
        }

        .toggle-buttons {
            display: flex;
            margin-bottom: 1rem;
            background: #eee;
            border-radius: 30px;
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .toggle-btn.active {
            background: #E8B13C;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        input {
            width: 100%;
            padding: 10px;
        }

        .btn-primary {
            width: 100%;
            padding: 10px;
            background: #E8B13C;
            border: none;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            color: white;
            border-radius: 20px;
        }

        .success { background: green; }
        .error { background: red; }
    </style>
</head>

<body>

<nav class="navbar">
    <div class="logo">Sohrab Industries</div>
</nav>

<div class="main-container">

    <div class="hero-content">
        <h1>Shop Quality Bulbs</h1>
    </div>

    <div class="auth-card">

        <div class="toggle-buttons">
            <button class="toggle-btn" id="loginTabBtn">Login</button>
            <button class="toggle-btn active" id="signupTabBtn">Sign Up</button>
        </div>

        <!-- SIGNUP -->
        <div id="signupSection">
            <div class="form-group"><input type="text" id="signupName" placeholder="Full Name"></div>
            <div class="form-group"><input type="email" id="signupEmail" placeholder="Email"></div>
            <div class="form-group"><input type="text" id="signupPhone" placeholder="Phone"></div>
            <div class="form-group"><input type="text" id="signupAddress" placeholder="Address"></div>
            <div class="form-group"><input type="password" id="signupPassword" placeholder="Password"></div>
            <div class="form-group"><input type="password" id="signupConfirm" placeholder="Confirm Password"></div>
            <button class="btn-primary" id="signupBtn">Create Account</button>
        </div>

        <!-- LOGIN -->
        <div id="loginSection" class="hidden">
            <div class="form-group"><input type="email" id="loginEmail" placeholder="Email"></div>
            <div class="form-group"><input type="password" id="loginPassword" placeholder="Password"></div>
            <button class="btn-primary" id="loginBtn">Login</button>
        </div>

        <p id="toggleFormLink" style="cursor:pointer; margin-top:10px;">
            Already have an account? Login →
        </p>

    </div>
</div>

<script>
const supabase = window.supabase.createClient(
    'https://czvxrjtdintvfjcgblxm.supabase.co',
    'YOUR_ANON_KEY'
);

const signupSection = document.getElementById('signupSection');
const loginSection = document.getElementById('loginSection');

const loginTabBtn = document.getElementById('loginTabBtn');
const signupTabBtn = document.getElementById('signupTabBtn');
const toggleFormLink = document.getElementById('toggleFormLink');

function showLoginForm() {
    signupSection.classList.add('hidden');
    loginSection.classList.remove('hidden');

    loginTabBtn.classList.add('active');
    signupTabBtn.classList.remove('active');

    toggleFormLink.textContent = "Don't have an account? Sign Up →";
}

function showSignupForm() {
    loginSection.classList.add('hidden');
    signupSection.classList.remove('hidden');

    signupTabBtn.classList.add('active');
    loginTabBtn.classList.remove('active');

    toggleFormLink.textContent = "Already have an account? Login →";
}

loginTabBtn.onclick = showLoginForm;
signupTabBtn.onclick = showSignupForm;

toggleFormLink.onclick = () => {
    if (loginSection.classList.contains('hidden')) {
        showLoginForm();
    } else {
        showSignupForm();
    }
};

function showToast(msg, error=false) {
    const t = document.createElement('div');
    t.className = 'toast ' + (error ? 'error' : 'success');
    t.innerText = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

/* SIGNUP */
document.getElementById('signupBtn').onclick = async () => {

    const name = signupName.value;
    const email = signupEmail.value;
    const phone = signupPhone.value;
    const address = signupAddress.value;
    const password = signupPassword.value;
    const confirm = signupConfirm.value;

    if (!name || !email || !phone || !address || !password) {
        return showToast('Fill all fields', true);
    }

    if (password !== confirm) {
        return showToast('Passwords mismatch', true);
    }

    const btn = signupBtn;
    btn.disabled = true;
    btn.innerText = "Creating...";

    const { data, error } = await supabase.auth.signUp({ email, password });

    if (error) {
        showToast(error.message, true);
        btn.disabled = false;
        btn.innerText = "Create Account";
        return;
    }

    showToast("Account created!");
    btn.disabled = false;
    btn.innerText = "Create Account";

    showLoginForm();
};

/* LOGIN */
document.getElementById('loginBtn').onclick = async () => {

    const email = loginEmail.value;
    const password = loginPassword.value;

    if (!email || !password) {
        return showToast('Enter email/password', true);
    }

    const btn = loginBtn;
    btn.disabled = true;
    btn.innerText = "Logging in...";

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
        showToast('Invalid login', true);
        btn.disabled = false;
        btn.innerText = "Login";
        return;
    }

    showToast("Login success");

    btn.disabled = false;
    btn.innerText = "Login";

    setTimeout(() => {
        window.location.href = "buyer.html";
    }, 1000);
};
</script>

</body>
</html>
