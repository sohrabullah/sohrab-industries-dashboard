<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sohrab Industries | Investor Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0B2B26, #1A4D3E);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 450px;
            width: 90%;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h2 {
            text-align: center;
            color: #1E4E3E;
            margin-bottom: 20px;
        }
        .logo {
            text-align: center;
            font-size: 40px;
            margin-bottom: 10px;
        }
        .toggle-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .toggle-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            background: #f0f0f0;
        }
        .toggle-btn.active {
            background: #1E4E3E;
            color: white;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #1E4E3E;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #2A6B58;
        }
        .toggle-link {
            text-align: center;
            margin-top: 15px;
            color: #666;
        }
        .toggle-link a {
            color: #1E4E3E;
            cursor: pointer;
            text-decoration: underline;
        }
        .message {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .back-home {
            text-align: center;
            margin-top: 15px;
        }
        .back-home a {
            color: #1E4E3E;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">💡</div>
        <h2>Sohrab Industries</h2>
        
        <div class="toggle-buttons">
            <button class="toggle-btn" id="loginTabBtn">Login</button>
            <button class="toggle-btn active" id="signupTabBtn">Sign Up</button>
        </div>

        <div id="messageDiv" class="message"></div>

        <!-- SIGNUP FORM -->
        <div id="signupForm">
            <div class="form-group">
                <input type="text" id="signupName" placeholder="Full Name">
            </div>
            <div class="form-group">
                <input type="email" id="signupEmail" placeholder="Email Address">
            </div>
            <div class="form-group">
                <input type="tel" id="signupPhone" placeholder="Phone Number">
            </div>
            <div class="form-group">
                <input type="text" id="signupCity" placeholder="City">
            </div>
            <div class="form-group">
                <input type="password" id="signupPassword" placeholder="Password (min 6 characters)">
            </div>
            <div class="form-group">
                <input type="password" id="signupConfirm" placeholder="Confirm Password">
            </div>
            <button id="signupBtn">Create Investor Account</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm" style="display: none;">
            <div class="form-group">
                <input type="email" id="loginEmail" placeholder="Email Address">
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" placeholder="Password">
            </div>
            <button id="loginBtn">Login to Dashboard</button>
        </div>

        <div class="toggle-link">
            <a id="toggleLink">Already have an account? Login →</a>
        </div>
        <div class="back-home">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <script>
        // YOUR SUPABASE CONFIGURATION
        const SUPABASE_URL = 'https://czvxrjtdintvfjcgblxm.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN6dnhyanRkaW50dmZqY2dibHhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4OTY4NTcsImV4cCI6MjA5MTQ3Mjg1N30.jc8n6tinfkM7LuEMza1N2yX2u-IeVgOfFcaAtwBjX0g';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Get elements
        const signupForm = document.getElementById('signupForm');
        const loginForm = document.getElementById('loginForm');
        const loginTab = document.getElementById('loginTabBtn');
        const signupTab = document.getElementById('signupTabBtn');
        const toggleLink = document.getElementById('toggleLink');
        const messageDiv = document.getElementById('messageDiv');

        function showMessage(msg, isError) {
            messageDiv.textContent = msg;
            messageDiv.className = isError ? 'message error' : 'message success';
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 4000);
        }

        // Show Login Form
        function showLogin() {
            signupForm.style.display = 'none';
            loginForm.style.display = 'block';
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
            toggleLink.innerHTML = "Don't have an account? Sign Up →";
        }

        // Show Signup Form
        function showSignup() {
            loginForm.style.display = 'none';
            signupForm.style.display = 'block';
            signupTab.classList.add('active');
            loginTab.classList.remove('active');
            toggleLink.innerHTML = "Already have an account? Login →";
        }

        loginTab.onclick = showLogin;
        signupTab.onclick = showSignup;
        toggleLink.onclick = function() {
            if (loginForm.style.display === 'none') {
                showLogin();
            } else {
                showSignup();
            }
        };

        // ========== SIGNUP FUNCTION ==========
        document.getElementById('signupBtn').onclick = async function() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const phone = document.getElementById('signupPhone').value.trim();
            const city = document.getElementById('signupCity').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;

            if (!name || !email || !phone || !city || !password) {
                showMessage('Please fill all fields', true);
                return;
            }
            if (password !== confirm) {
                showMessage('Passwords do not match', true);
                return;
            }
            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', true);
                return;
            }

            const btn = document.getElementById('signupBtn');
            btn.disabled = true;
            btn.textContent = 'Creating Account...';

            try {
                // 1. Create user in Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: name,
                            phone: phone,
                            city: city,
                            role: 'investor'
                        }
                    }
                });

                if (authError) {
                    showMessage(authError.message, true);
                    btn.disabled = false;
                    btn.textContent = 'Create Investor Account';
                    return;
                }

                if (authData.user) {
                    // 2. Insert into investors table
                    const { error: insertError } = await supabase
                        .from('investors')
                        .insert({
                            id: authData.user.id,
                            email: email,
                            full_name: name,
                            phone: phone,
                            city: city,
                            created_at: new Date().toISOString()
                        });

                    if (insertError) {
                        console.log('Insert error:', insertError);
                        showMessage('Account created! Please login.', false);
                    } else {
                        showMessage('Account created successfully! Please login.', false);
                    }

                    // Clear form
                    document.getElementById('signupName').value = '';
                    document.getElementById('signupEmail').value = '';
                    document.getElementById('signupPhone').value = '';
                    document.getElementById('signupCity').value = '';
                    document.getElementById('signupPassword').value = '';
                    document.getElementById('signupConfirm').value = '';

                    // Switch to login
                    showLogin();
                }
            } catch (err) {
                showMessage('Error: ' + err.message, true);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Investor Account';
            }
        };

        // ========== LOGIN FUNCTION ==========
        document.getElementById('loginBtn').onclick = async function() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('Please enter email and password', true);
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (error) {
                showMessage('Invalid email or password', true);
                btn.disabled = false;
                btn.textContent = 'Login to Dashboard';
                return;
            }

            if (data.user) {
                localStorage.setItem('user', JSON.stringify(data.user));
                localStorage.setItem('userType', 'investor');
                showMessage('Login successful! Redirecting...', false);
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }
        };

        // Enter key support
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    if (loginForm.style.display !== 'none') {
                        document.getElementById('loginBtn').click();
                    } else {
                        document.getElementById('signupBtn').click();
                    }
                }
            });
        });
    </script>
</body>
</html>
